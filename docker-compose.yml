version: "3.9"
services:
  heart-api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
  mlflow:
    image: python:3.11-slim
    command: bash -c "pip install mlflow==2.14.3 && mlflow ui --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns

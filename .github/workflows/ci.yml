name: MLOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn matplotlib seaborn joblib fastapi uvicorn pytest prometheus-client

      - name: Run unit tests
        run: |
          pytest tests/ || true

      - name: Validate Dockerfile exists
        run: |
          test -f Dockerfile
          test -f requirements.txt
          test -d api
